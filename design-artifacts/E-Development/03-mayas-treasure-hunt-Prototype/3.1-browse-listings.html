<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.1 Browse Listings - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-3xl mx-auto text-sm text-gray-500">bookswap</div>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-6">
        <div id="browse-filters" data-object-id="browse-filters" class="flex flex-wrap gap-2 mb-6">
            <button onclick="filterByGenre('all')" data-genre="all" class="genre-chip px-3 py-1 rounded-full text-sm border border-gray-300">All</button>
            <button onclick="filterByGenre('Fantasy')" data-genre="Fantasy" class="genre-chip px-3 py-1 rounded-full text-sm border border-gray-300">Fantasy</button>
            <button onclick="filterByGenre('Sci-Fi')" data-genre="Sci-Fi" class="genre-chip px-3 py-1 rounded-full text-sm border border-gray-300">Sci-Fi</button>
            <button onclick="filterByGenre('Historical Fiction')" data-genre="Historical Fiction" class="genre-chip px-3 py-1 rounded-full text-sm border border-gray-300">Historical Fiction</button>
        </div>

        <div id="browse-grid" data-object-id="browse-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <!-- rendered by JS -->
        </div>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 3.1 Browse Listings
         * Purpose: Let Maya discover an unexpected book through casual browsing.
         */
        window.initPage = async function () {
            console.log('📄 3.1 Browse Listings loaded');
            await renderGrid('all');
        };

        async function filterByGenre(genre) {
            document.querySelectorAll('.genre-chip').forEach((chip) => {
                chip.classList.toggle('bg-bookswap-600', chip.dataset.genre === genre);
                chip.classList.toggle('text-white', chip.dataset.genre === genre);
                chip.classList.toggle('border-bookswap-600', chip.dataset.genre === genre);
            });
            await renderGrid(genre);
        }

        async function renderGrid(genre) {
            const listings = await window.PrototypeAPI.getBrowseListings(genre);
            const grid = document.getElementById('browse-grid');
            grid.innerHTML = listings.map((item) => `
                <a
                    id="browse-card-${item.id}"
                    data-object-id="browse-card-${item.id}"
                    href="3.2-book-listing-detail.html?id=${item.id}"
                    class="block bg-white border border-gray-200 rounded-lg overflow-hidden hover:shadow-md transition-shadow"
                >
                    <div class="aspect-[2/3] bg-gray-100 flex items-center justify-center text-xs text-gray-400">cover</div>
                    <div class="p-2">
                        <p class="text-sm font-medium text-gray-900 truncate">${item.title}</p>
                        <p class="text-xs text-gray-500 truncate">${item.author}</p>
                        <p class="text-xs text-gray-400 mt-1">${item.condition}</p>
                    </div>
                </a>
            `).join('');
        }
    </script>
</body>
</html>
