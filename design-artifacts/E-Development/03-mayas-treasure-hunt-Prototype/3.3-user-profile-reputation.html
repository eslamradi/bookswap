<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.3 User Profile/Reputation - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-lg mx-auto">
            <a href="#" onclick="history.back(); return false;" class="text-sm text-gray-500">← back</a>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="profile-trust-summary" data-object-id="profile-trust-summary" class="flex items-center gap-3 mb-6">
            <div class="w-14 h-14 rounded-full bg-gray-200 flex items-center justify-center text-lg text-gray-500">👤</div>
            <div>
                <p id="profile-name" class="font-semibold text-gray-900"></p>
                <p id="profile-rating" class="text-sm text-gray-500"></p>
                <p id="profile-member-since" class="text-xs text-gray-400"></p>
            </div>
        </div>

        <div id="profile-reviews" data-object-id="profile-reviews" class="space-y-2 mb-6">
            <!-- rendered by JS -->
        </div>
        <p id="profile-new-member-hint" class="hidden text-sm text-gray-400 text-center py-4">
            New member — no trade history yet.
        </p>

        <button
            id="profile-proceed-btn"
            data-object-id="profile-proceed-btn"
            onclick="handleProceed()"
            class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors"
        >
            Request this book
        </button>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 3.3 User Profile/Reputation
         * Purpose: Let Maya confirm the lister is trustworthy before committing.
         */
        let currentListingId = '';

        window.initPage = async function () {
            console.log('📄 3.3 User Profile/Reputation loaded');
            const params = new URLSearchParams(window.location.search);
            currentListingId = params.get('listingId');
            let listerId = params.get('listerId');

            if (!listerId && currentListingId) {
                const listing = await window.PrototypeAPI.getListing(currentListingId);
                listerId = listing ? listing.listerId : null;
            }

            const lister = await window.PrototypeAPI.getLister(listerId);
            if (!lister) {
                console.error('❌ Lister not found:', listerId);
                return;
            }

            document.getElementById('profile-name').textContent = lister.name;
            document.getElementById('profile-rating').textContent =
                lister.tradeCount > 0 ? `★ ${lister.rating} (${lister.tradeCount})` : 'New member';
            document.getElementById('profile-member-since').textContent = `Member since ${lister.memberSince}`;

            if (lister.reviews.length === 0) {
                document.getElementById('profile-new-member-hint').classList.remove('hidden');
            } else {
                document.getElementById('profile-reviews').innerHTML = lister.reviews.map((r) => `
                    <div class="bg-white border border-gray-200 rounded-lg p-3 text-sm">
                        <span class="text-yellow-500">${'★'.repeat(r.rating)}</span>
                        <span class="text-gray-600 ml-1">"${r.comment}"</span>
                    </div>
                `).join('');
            }
        };

        function handleProceed() {
            window.location.href = `3.4-create-listing-single.html?listingId=${currentListingId}`;
        }
    </script>
</body>
</html>
