<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3.2 Book Listing Detail - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-lg mx-auto">
            <a href="3.1-browse-listings.html" class="text-sm text-gray-500">← bookswap</a>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="listing-detail-photos" data-object-id="listing-detail-photos" class="aspect-[3/2] bg-gray-100 rounded-lg flex items-center justify-center text-gray-400 mb-4">
            photo carousel
        </div>

        <h1 id="listing-detail-title" data-object-id="listing-detail-title" class="text-xl font-bold text-gray-900"></h1>
        <p id="listing-detail-author" data-object-id="listing-detail-author" class="text-gray-500 mb-2"></p>
        <p id="listing-detail-condition" data-object-id="listing-detail-condition" class="text-sm font-medium text-gray-700 mb-4"></p>

        <p id="listing-detail-description" data-object-id="listing-detail-description" class="text-sm text-gray-600 mb-6"></p>

        <a id="listing-detail-lister-link" data-object-id="listing-detail-lister-link" href="#" class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg p-3 mb-6 hover:bg-gray-50">
            <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center text-xs text-gray-500">👤</div>
            <div class="flex-1">
                <p id="listing-detail-lister-name" class="text-sm font-medium text-gray-900"></p>
                <p id="listing-detail-lister-rating" class="text-xs text-gray-500"></p>
            </div>
            <span class="text-gray-400">→</span>
        </a>

        <button
            id="listing-detail-request-btn"
            data-object-id="listing-detail-request-btn"
            onclick="handleRequest()"
            class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors"
        >
            Request this book
        </button>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 3.2 Book Listing Detail (template page — shared shape for every listing)
         * Purpose: Let a viewer evaluate condition/trust signals before requesting.
         */
        let currentListingId = '';

        window.initPage = async function () {
            console.log('📄 3.2 Book Listing Detail loaded');
            const params = new URLSearchParams(window.location.search);
            currentListingId = params.get('id');

            const listing = await window.PrototypeAPI.getListing(currentListingId);
            if (!listing) {
                console.error('❌ Listing not found:', currentListingId);
                return;
            }

            document.getElementById('listing-detail-title').textContent = listing.title;
            document.getElementById('listing-detail-author').textContent = listing.author;
            document.getElementById('listing-detail-condition').textContent = `Condition: ${listing.condition}`;
            document.getElementById('listing-detail-description').textContent = listing.description;

            const lister = await window.PrototypeAPI.getLister(listing.listerId);
            document.getElementById('listing-detail-lister-name').textContent = lister.name;
            document.getElementById('listing-detail-lister-rating').textContent =
                lister.tradeCount > 0 ? `★ ${lister.rating} (${lister.tradeCount} trades)` : 'New member';
            document.getElementById('listing-detail-lister-link').href = `3.3-user-profile-reputation.html?listerId=${lister.id}&listingId=${listing.id}`;
        };

        function handleRequest() {
            window.location.href = `3.3-user-profile-reputation.html?listingId=${currentListingId}`;
        }
    </script>
</body>
</html>
