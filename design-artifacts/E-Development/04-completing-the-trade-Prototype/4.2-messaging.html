<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.2 Messaging - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans flex flex-col">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3 flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs">👤</div>
        <span id="messaging-counterpart-name" class="text-sm font-medium text-gray-900"></span>
    </header>

    <main class="flex-1 max-w-lg w-full mx-auto px-4 py-4 overflow-y-auto">
        <div id="messaging-thread" data-object-id="messaging-thread" class="space-y-2">
            <!-- rendered by JS -->
        </div>
        <p id="messaging-empty-hint" class="text-sm text-gray-400 text-center py-6">
            Say hi and confirm shipping details
        </p>
    </main>

    <div class="max-w-lg w-full mx-auto px-4 py-3 border-t border-gray-200 bg-white">
        <form id="messaging-composer-form" onsubmit="handleSend(event)" class="flex gap-2">
            <input
                type="text"
                id="messaging-input"
                data-object-id="messaging-input"
                placeholder="Type a message..."
                class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-bookswap-500"
            />
            <button type="submit" id="messaging-send-btn" data-object-id="messaging-send-btn" class="px-4 py-2 bg-bookswap-600 text-white rounded-lg">
                Send
            </button>
        </form>
        <button
            id="messaging-continue-btn"
            data-object-id="messaging-continue-btn"
            onclick="handleContinue()"
            class="w-full mt-3 py-2 text-sm text-bookswap-600 font-medium hover:text-bookswap-700"
        >
            Continue to Checkout →
        </button>
    </div>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 4.2 Messaging
         * Purpose: Coordinate handoff without exposing personal contact info.
         */
        window.initPage = async function () {
            console.log('📄 4.2 Messaging loaded');
            const trade = await window.PrototypeAPI.getTrade();
            document.getElementById('messaging-counterpart-name').textContent = trade.counterpart.name;
            await renderThread();
        };

        async function renderThread() {
            const messages = await window.PrototypeAPI.getMessages();
            const thread = document.getElementById('messaging-thread');
            const emptyHint = document.getElementById('messaging-empty-hint');
            emptyHint.classList.toggle('hidden', messages.length > 0);

            thread.innerHTML = messages.map((m) => `
                <div class="flex ${m.from === 'me' ? 'justify-end' : 'justify-start'}">
                    <div class="max-w-[75%] px-3 py-2 rounded-lg text-sm ${m.from === 'me' ? 'bg-bookswap-600 text-white' : 'bg-white border border-gray-200 text-gray-900'}">
                        ${m.text}
                    </div>
                </div>
            `).join('');
        }

        async function handleSend(event) {
            event.preventDefault();
            const input = document.getElementById('messaging-input');
            const text = input.value.trim();
            if (!text) return;

            await window.PrototypeAPI.sendMessage(text, 'me');
            input.value = '';
            await renderThread();
        }

        function handleContinue() {
            window.location.href = '4.3-checkout.html';
        }
    </script>
</body>
</html>
