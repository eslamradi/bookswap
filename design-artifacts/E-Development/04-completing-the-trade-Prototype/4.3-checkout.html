<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.3 Checkout - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3 text-sm text-gray-500">bookswap</header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="checkout-summary" data-object-id="checkout-summary" class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
            <p id="checkout-summary-text" class="text-gray-900"></p>
        </div>

        <button
            id="checkout-confirm-btn"
            data-object-id="checkout-confirm-btn"
            onclick="handleConfirm()"
            class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors"
        >
            Continue
        </button>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 4.3 Checkout
         * Purpose: Settle terms — payment for sale, pass-through confirmation for exchange.
         */
        window.initPage = async function () {
            console.log('📄 4.3 Checkout loaded');
            const trade = await window.PrototypeAPI.getTrade();
            const summaryEl = document.getElementById('checkout-summary-text');
            const btn = document.getElementById('checkout-confirm-btn');

            if (trade.offerType === 'sale') {
                summaryEl.textContent = `Book: $${trade.price || '8.00'}`;
                btn.textContent = 'Pay now';
            } else {
                summaryEl.textContent = 'No payment due — this is a straight exchange';
                btn.textContent = 'Continue';
            }
        };

        async function handleConfirm() {
            console.log('✅ Checkout confirmed');
            await window.PrototypeAPI.confirmCheckout();
            window.location.href = '4.4-shipping-handoff-coordination.html';
        }
    </script>
</body>
</html>
