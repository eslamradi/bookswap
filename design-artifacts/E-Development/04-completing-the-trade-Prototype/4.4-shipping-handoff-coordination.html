<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.4 Shipping/Handoff Coordination - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3 text-sm text-gray-500">bookswap</header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <p class="text-sm text-gray-600 mb-2">Ship via:</p>
        <div id="shipping-method-options" data-object-id="shipping-method-options" class="space-y-2 mb-6">
            <label class="flex items-center gap-2 bg-white border border-gray-200 rounded-lg p-3 cursor-pointer">
                <input type="radio" name="shipMethod" value="label" checked>
                <span class="text-sm text-gray-900">Prepaid label (mailed)</span>
            </label>
            <label class="flex items-center gap-2 bg-white border border-gray-200 rounded-lg p-3 cursor-pointer">
                <input type="radio" name="shipMethod" value="locker">
                <span class="text-sm text-gray-900">Drop-off locker</span>
            </label>
        </div>

        <button
            id="shipping-generate-label-btn"
            data-object-id="shipping-generate-label-btn"
            onclick="handleGenerateLabel()"
            class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors mb-4"
        >
            Get shipping label
        </button>

        <div id="shipping-label-result" data-object-id="shipping-label-result" class="hidden bg-white border border-gray-200 rounded-lg p-4 text-center mb-4">
            <p class="text-2xl mb-1">📦</p>
            <p class="text-sm text-gray-600">Label generated — ready to ship</p>
        </div>

        <p id="shipping-privacy-reassurance" data-object-id="shipping-privacy-reassurance" class="text-sm text-center text-gray-500">
            Your address stays private
        </p>

        <button
            id="shipping-continue-btn"
            data-object-id="shipping-continue-btn"
            onclick="handleContinue()"
            disabled
            class="w-full mt-4 py-3 border border-gray-300 text-gray-400 rounded-lg font-medium disabled:cursor-not-allowed"
        >
            Continue to Tracking →
        </button>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 4.4 Shipping/Handoff Coordination
         * Purpose: Address-masked shipping — Tom never hands over his real address.
         */
        window.initPage = function () {
            console.log('📄 4.4 Shipping/Handoff Coordination loaded');
        };

        async function handleGenerateLabel() {
            console.log('📮 Generating masked shipping label');
            await window.PrototypeAPI.generateShippingLabel();

            document.getElementById('shipping-label-result').classList.remove('hidden');
            const continueBtn = document.getElementById('shipping-continue-btn');
            continueBtn.disabled = false;
            continueBtn.classList.remove('text-gray-400');
            continueBtn.classList.add('text-bookswap-600', 'border-bookswap-600');
        }

        function handleContinue() {
            window.location.href = '4.5-trade-confirmation-tracking.html';
        }
    </script>
</body>
</html>
