<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.6 Post-Trade Rating - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3 text-sm text-gray-500">bookswap</header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="rating-trade-complete" data-object-id="rating-trade-complete" class="text-center mb-6">
            <p class="text-xl font-bold text-gray-900">Trade complete!</p>
        </div>

        <div id="rating-input-section" data-object-id="rating-input-section" class="bg-white border border-gray-200 rounded-lg p-4">
            <p id="rating-counterpart-label" class="text-sm text-gray-600 mb-3"></p>
            <div id="rating-stars" data-object-id="rating-stars" class="flex gap-1 mb-3 text-2xl">
                <button type="button" class="star-btn text-gray-300" data-value="1" onclick="selectRating(1)">★</button>
                <button type="button" class="star-btn text-gray-300" data-value="2" onclick="selectRating(2)">★</button>
                <button type="button" class="star-btn text-gray-300" data-value="3" onclick="selectRating(3)">★</button>
                <button type="button" class="star-btn text-gray-300" data-value="4" onclick="selectRating(4)">★</button>
                <button type="button" class="star-btn text-gray-300" data-value="5" onclick="selectRating(5)">★</button>
            </div>
            <textarea
                id="rating-comment"
                data-object-id="rating-comment"
                placeholder="Optional comment..."
                rows="2"
                class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-bookswap-500"
            ></textarea>
        </div>

        <button
            id="rating-submit-btn"
            data-object-id="rating-submit-btn"
            onclick="handleSubmitRating()"
            disabled
            class="w-full mt-4 py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
        >
            Submit rating
        </button>

        <div id="rating-submitted-confirmation" data-object-id="rating-submitted-confirmation" class="hidden text-center py-8">
            <p class="text-lg font-semibold text-gray-900">✓ Thanks for rating!</p>
        </div>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 4.6 Post-Trade Rating
         * Purpose: Close out the trade with mutual ratings — scenario's success point.
         */
        let selectedRating = 0;

        window.initPage = async function () {
            console.log('📄 4.6 Post-Trade Rating loaded');
            const trade = await window.PrototypeAPI.getTrade();
            document.getElementById('rating-counterpart-label').textContent = `Rate ${trade.counterpart.name}:`;
        };

        function selectRating(value) {
            selectedRating = value;
            document.querySelectorAll('.star-btn').forEach((btn) => {
                btn.classList.toggle('text-yellow-500', parseInt(btn.dataset.value) <= value);
                btn.classList.toggle('text-gray-300', parseInt(btn.dataset.value) > value);
            });
            document.getElementById('rating-submit-btn').disabled = false;
        }

        async function handleSubmitRating() {
            const comment = document.getElementById('rating-comment').value.trim();
            console.log('⭐ Submitting rating:', selectedRating, comment);
            await window.PrototypeAPI.submitRating(selectedRating, comment);

            document.getElementById('rating-input-section').classList.add('hidden');
            document.getElementById('rating-submit-btn').classList.add('hidden');
            document.getElementById('rating-submitted-confirmation').classList.remove('hidden');
        }
    </script>
</body>
</html>
