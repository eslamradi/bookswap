<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4.1 Trade/Offer Flow - bookswap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: {
            colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-lg mx-auto text-sm text-gray-500">bookswap</div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <div id="offer-trade-summary" data-object-id="offer-trade-summary" class="bg-white border border-gray-200 rounded-lg p-4 mb-4">
            <p class="text-xs text-gray-500 mb-1">Your book:</p>
            <p id="offer-book-title" class="font-semibold text-gray-900 mb-3"></p>
            <p class="text-xs text-gray-500 mb-1">Claimed by:</p>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-xs">👤</div>
                <div>
                    <p id="offer-counterpart-name" class="text-sm font-medium text-gray-900"></p>
                    <p id="offer-counterpart-rating" class="text-xs text-gray-500"></p>
                </div>
            </div>
        </div>

        <div id="offer-terms" data-object-id="offer-terms" class="bg-white border border-gray-200 rounded-lg p-4 mb-6">
            <p class="text-xs text-gray-500 mb-1">Offer:</p>
            <p id="offer-terms-text" class="text-sm font-medium text-gray-900"></p>
        </div>

        <div id="offer-actions" data-object-id="offer-actions" class="space-y-2">
            <button
                id="offer-accept-btn"
                data-object-id="offer-accept-btn"
                onclick="handleAccept()"
                class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors"
            >
                Accept trade
            </button>
            <button
                id="offer-decline-btn"
                data-object-id="offer-decline-btn"
                onclick="handleDecline()"
                class="w-full py-3 border border-gray-300 text-gray-700 rounded-lg font-medium hover:bg-gray-50 transition-colors"
            >
                Decline
            </button>
        </div>

        <div id="offer-declined-message" data-object-id="offer-declined-message" class="hidden text-center py-8 text-gray-500">
            Trade declined. Your listing is live again.
        </div>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 4.1 Trade/Offer Flow
         * Purpose: Let Tom review and confirm trade terms in one screen.
         */
        window.initPage = async function () {
            console.log('📄 4.1 Trade/Offer Flow loaded');
            const trade = await window.PrototypeAPI.getTrade();

            document.getElementById('offer-book-title').textContent = `${trade.book.title} by ${trade.book.author}`;
            document.getElementById('offer-counterpart-name').textContent = trade.counterpart.name;
            document.getElementById('offer-counterpart-rating').textContent = `★ ${trade.counterpart.rating} (${trade.counterpart.tradeCount} trades)`;
            document.getElementById('offer-terms-text').textContent =
                trade.offerType === 'sale' ? `Sale — $${trade.price || '8.00'}` : 'Straight claim (exchange, no payment)';
        };

        async function handleAccept() {
            console.log('✅ Trade accepted');
            await window.PrototypeAPI.acceptTrade();
            window.location.href = '4.2-messaging.html';
        }

        function handleDecline() {
            console.log('❌ Trade declined');
            document.getElementById('offer-actions').classList.add('hidden');
            document.getElementById('offer-declined-message').classList.remove('hidden');
        }
    </script>
</body>
</html>
