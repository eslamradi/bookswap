prototype_limitation: >
  No real camera/barcode scanning in a static browser prototype. Simulated via
  the spec's own manual-ISBN fallback (select/type an ISBN from the demo
  catalog); photo capture simulated via a toggle rather than a real camera.

objects:
  - header live count ("N books added")
  - ISBN entry (simulated scan)
  - scan-failed state
  - book queue cards (thumbnail, title, author, condition selector, photo toggle, remove)
  - bulk submit button (sticky, live count)
  - submitting state
  - submit-error state (queue preserved)

