<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1.1 Sign Up/Login - bookswap</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config (Design Tokens) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bookswap: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#2563eb',
                            600: '#1d4ed8',
                            700: '#1e40af',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Dev Mode Styles (feedback/testing tool) -->
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <!-- ========================================================================
         DEV MODE TOGGLE (for easy feedback - copy Object IDs)
         ======================================================================== -->
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <!-- ========================================================================
         MAIN CONTENT — Section 1: Page Shell & Value Headline
         No nav chrome, deliberately — nothing here should tempt browsing.
         ======================================================================== -->
    <main class="min-h-screen flex items-center justify-center px-4">
        <div id="signup-login-container" data-object-id="signup-login-container" class="w-full max-w-sm">
            <header class="text-center mb-8">
                <div id="signup-login-logo" data-object-id="signup-login-logo" class="text-lg font-semibold text-gray-900 mb-6">
                    bookswap
                </div>
                <h1 id="signup-login-headline" data-object-id="signup-login-headline" class="text-2xl font-bold text-gray-900">
                    Get your books gone in minutes
                </h1>
            </header>

            <!-- ============================================================
                 SECTION 2: Authentication Actions & States
                 ============================================================ -->
            <div id="signup-login-auth-section" data-object-id="signup-login-auth-section" class="space-y-3">
                <button
                    id="signup-login-btn-google"
                    data-object-id="signup-login-btn-google"
                    onclick="handleAuth('google')"
                    class="w-full py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    <span class="btn-label">Continue with Google</span>
                    <svg class="btn-spinner hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>

                <button
                    id="signup-login-btn-apple"
                    data-object-id="signup-login-btn-apple"
                    onclick="handleAuth('apple')"
                    class="w-full py-3 border border-gray-300 rounded-lg font-medium text-gray-700 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    <span class="btn-label">Continue with Apple</span>
                    <svg class="btn-spinner hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>

                <div class="flex items-center gap-3 py-1">
                    <div class="flex-1 h-px bg-gray-200"></div>
                    <span id="signup-login-divider" data-object-id="signup-login-divider" class="text-xs text-gray-400">or</span>
                    <div class="flex-1 h-px bg-gray-200"></div>
                </div>

                <input
                    type="email"
                    id="signup-login-input-email"
                    data-object-id="signup-login-input-email"
                    placeholder="Email address"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-bookswap-500 focus:border-transparent"
                />

                <button
                    id="signup-login-btn-email"
                    data-object-id="signup-login-btn-email"
                    onclick="handleAuth('email')"
                    class="w-full py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    <span class="btn-label">Continue</span>
                    <svg class="btn-spinner hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>

                <p id="signup-login-error" data-object-id="signup-login-error" class="hidden text-sm text-red-600 text-center"></p>
            </div>
        </div>
    </main>

    <!-- ========================================================================
         JAVASCRIPT - Shared Scripts
         ======================================================================== -->
    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>

    <!-- ========================================================================
         JAVASCRIPT - Dev Mode (feedback tool)
         ======================================================================== -->
    <script src="components/dev-mode.js"></script>

    <!-- ========================================================================
         JAVASCRIPT - Page-Specific Script
         ======================================================================== -->
    <script>
        /**
         * Page: 1.1 Sign Up/Login
         * Purpose: Get Tom authenticated with minimum friction.
         */
        window.initPage = function () {
            console.log('📄 1.1 Sign Up/Login loaded');
        };

        function setButtonsDisabled(disabled) {
            ['signup-login-btn-google', 'signup-login-btn-apple', 'signup-login-btn-email'].forEach((id) => {
                document.getElementById(id).disabled = disabled;
            });
        }

        function setButtonLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            btn.querySelector('.btn-label').classList.toggle('hidden', isLoading);
            btn.querySelector('.btn-spinner').classList.toggle('hidden', !isLoading);
        }

        function showAuthError(message) {
            const el = document.getElementById('signup-login-error');
            el.textContent = message;
            el.classList.remove('hidden');
        }

        function clearAuthError() {
            document.getElementById('signup-login-error').classList.add('hidden');
        }

        async function handleAuth(method) {
            clearAuthError();

            if (method === 'email') {
                const email = document.getElementById('signup-login-input-email').value.trim();
                if (!email) {
                    showAuthError('Enter your email to continue');
                    return;
                }
            }

            const buttonId = `signup-login-btn-${method}`;
            setButtonsDisabled(true);
            setButtonLoading(buttonId, true);

            try {
                console.log('🔐 Authenticating via', method);
                await window.PrototypeAPI.authenticate(method);
                console.log('✅ Authenticated, navigating to Batch Listing');
                window.location.href = '1.2-batch-listing.html';
            } catch (error) {
                console.error('❌ Auth error:', error);
                showAuthError('Something went wrong — try again');
                setButtonsDisabled(false);
                setButtonLoading(buttonId, false);
            }
        }
    </script>
</body>
</html>
