<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.1 Home/Landing - bookswap</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <!-- SECTION: Search Bar (dominant, auto-focused) -->
    <main class="min-h-screen flex flex-col items-center justify-center px-4">
        <div id="home-container" data-object-id="home-container" class="w-full max-w-md text-center">
            <div class="text-lg font-semibold text-gray-900 mb-8">bookswap</div>

            <form id="home-search-form" onsubmit="handleSearchSubmit(event)">
                <input
                    type="text"
                    id="home-search-input"
                    data-object-id="home-search-input"
                    placeholder="Search title or ISBN"
                    autofocus
                    class="w-full px-4 py-3 text-lg border-2 border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-bookswap-500 focus:border-transparent"
                />
            </form>

            <!-- Secondary content — below the fold in spirit, kept low-emphasis here -->
            <div class="mt-10 flex justify-center gap-6 text-sm text-gray-500">
                <a href="#" class="hover:text-gray-700">Browse by genre →</a>
                <a href="#" class="hover:text-gray-700">How it works →</a>
            </div>
        </div>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 2.1 Home/Landing
         * Purpose: Get Priya to a working search within seconds of arrival.
         */
        window.initPage = function () {
            console.log('📄 2.1 Home/Landing loaded');
            document.getElementById('home-search-input').focus();
        };

        function handleSearchSubmit(event) {
            event.preventDefault();
            const query = document.getElementById('home-search-input').value.trim();
            if (!query) return;
            console.log('🔍 Searching for:', query);
            window.location.href = `2.2-search-results.html?q=${encodeURIComponent(query)}`;
        }
    </script>
</body>
</html>
