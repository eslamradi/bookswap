<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.2 Search Results - bookswap</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { bookswap: { 50: '#eff6ff', 100: '#dbeafe', 500: '#2563eb', 600: '#1d4ed8', 700: '#1e40af' } },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="components/dev-mode.css">
</head>
<body class="min-h-screen bg-gray-50 font-sans">
    <button id="dev-mode-toggle" class="dev-mode-toggle" title="Toggle Dev Mode (Ctrl+E)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <span>Dev Mode: OFF</span>
    </button>
    <div id="dev-mode-tooltip" class="dev-mode-tooltip" style="display: none;"></div>

    <header class="bg-white border-b border-gray-200 px-4 py-3">
        <div class="max-w-lg mx-auto">
            <a href="2.1-home-landing.html" class="text-sm text-gray-500">← bookswap</a>
        </div>
    </header>

    <main class="max-w-lg mx-auto px-4 py-6">
        <h1 id="search-results-query" data-object-id="search-results-query" class="text-lg font-semibold text-gray-900 mb-4"></h1>

        <div id="search-results-loading" data-object-id="search-results-loading" class="hidden text-center py-8 text-gray-400">
            Searching…
        </div>

        <!-- MATCH FOUND state -->
        <div id="search-results-matches" data-object-id="search-results-matches" class="hidden space-y-2">
        </div>

        <!-- NO MATCH state -->
        <div id="search-results-no-match" data-object-id="search-results-no-match" class="hidden text-center py-8">
            <p class="text-gray-600 mb-4">No exact match right now</p>
            <button
                id="search-results-notify-btn"
                data-object-id="search-results-notify-btn"
                onclick="handleNotifyMe()"
                class="px-6 py-3 bg-bookswap-600 text-white rounded-lg font-semibold hover:bg-bookswap-700 transition-colors"
            >
                Notify me when available
            </button>
        </div>
    </main>

    <script src="data/demo-data.js"></script>
    <script src="shared/prototype-api.js"></script>
    <script src="shared/init.js"></script>
    <script src="shared/utils.js"></script>
    <script src="components/dev-mode.js"></script>

    <script>
        /**
         * Page: 2.2 Search Results
         * Purpose: Give Priya an unambiguous, immediate answer — match or no-match+notify.
         */
        let currentQuery = '';

        window.initPage = async function () {
            console.log('📄 2.2 Search Results loaded');

            const params = new URLSearchParams(window.location.search);
            currentQuery = params.get('q') || '';
            document.getElementById('search-results-query').textContent = `"${currentQuery}"`;

            document.getElementById('search-results-loading').classList.remove('hidden');

            // Simulate a brief search delay
            await new Promise((resolve) => setTimeout(resolve, 300));

            const results = await window.PrototypeAPI.search(currentQuery);
            document.getElementById('search-results-loading').classList.add('hidden');

            if (results.length > 0) {
                renderMatches(results);
            } else {
                document.getElementById('search-results-no-match').classList.remove('hidden');
            }
        };

        function renderMatches(results) {
            const container = document.getElementById('search-results-matches');
            container.classList.remove('hidden');
            container.innerHTML = results.map((item) => `
                <div class="bg-white border border-gray-200 rounded-lg p-3 flex items-center gap-3">
                    <div class="w-10 h-14 bg-gray-100 rounded flex items-center justify-center text-xs text-gray-400 flex-shrink-0">cover</div>
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-gray-900 truncate">${item.title}</p>
                        <p class="text-sm text-gray-500 truncate">${item.author} · ${item.condition}</p>
                    </div>
                </div>
            `).join('');
        }

        async function handleNotifyMe() {
            const btn = document.getElementById('search-results-notify-btn');
            btn.disabled = true;
            btn.textContent = 'Setting up alert…';

            console.log('🔔 Creating alert for:', currentQuery);
            await window.PrototypeAPI.createAlert(currentQuery);
            window.location.href = `2.3-notifications.html?q=${encodeURIComponent(currentQuery)}`;
        }
    </script>
</body>
</html>
